<!doctype html>
<html>
  <head><title>Signup - SkillBridge</title></head>
  <body>
    <h1>Signup</h1>

    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
      <pre>{{ form.errors }}</pre>
      {% endif %}
      {{ form.as_p }}
      <button type="submit">Create account</button>
    </form>

    <p>Already have an account? <a href="/login/">Login</a></p>
  </body>
</html>
