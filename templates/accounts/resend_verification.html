{% extends "base.html" %}
{% block title %}Resend Verification - SkillBridge{% endblock %}

{% block content %}
<div class="sb-card">
  <div class="text-center mb-6">
    <h1 class="text-2xl font-bold">Resend verification email</h1>
    <p class="text-white/60 text-sm mt-1">
      Enter your email and we’ll send a new verification link.
    </p>
  </div>

  <form method="post" class="space-y-5">
    {% csrf_token %}

    <div class="sb-field">
      <label for="email">Email</label>
      <input type="email" name="email" id="email" required placeholder="you@example.com">
      <p class="sb-help">Check spam/promotions too.</p>
    </div>

    <button class="sb-btn-primary" type="submit">Resend link</button>
  </form>

  <div class="mt-6 text-center text-sm">
    <a class="sb-link" href="/login/">Back to login</a>
  </div>
</div>
{% endblock %}
