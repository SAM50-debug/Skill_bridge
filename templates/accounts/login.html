<!doctype html>
<html>
  <head><title>Login - SkillBridge</title></head>
  <body>
    <h1>Login</h1>

    {% for message in messages %}
      <p>{{ message }}</p>
    {% endfor %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Sign in</button>
    </form>

    <p>Don't have an account? <a href="/signup/">Sign up</a></p>
  </body>
</html>
